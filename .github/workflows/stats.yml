name: Update README stats

on:
  schedule:
    - cron: "0 4 * * *"   # daily 04:00 UTC = 11:00 PM Colombia (UTC-5)
  push:
    branches: [main]
    paths:
      - stats.py
      - .github/workflows/stats.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render README with live stats
        env:
          # PAT with scopes read:user + repo → includes private contributions.
          # Falls back to GITHUB_TOKEN (public only) if the secret is not set.
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: python3 stats.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No stat changes."
          else
            git commit -m "chore: update README stats [skip ci]"
            git push
          fi
